# Publishes agent-gorgon to PyPI using OIDC Trusted Publishing.
# NO long-lived API tokens are used or stored in GitHub Secrets.
#
# Before this workflow runs for the first time, you must configure Trusted Publishing on PyPI:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new "pending publisher":
#      - PyPI project name: agent-gorgon
#      - GitHub owner: hermes-labs-ai
#      - Repository name: agent-gorgon
#      - Workflow filename: release.yml
#      - Environment name: pypi  (must match the `environment:` field below)
#   3. Save. No token needed - GitHub OIDC identity is sufficient.
#
# Then push a tag: git tag v0.1.0 && git push --tags
# This workflow fires automatically on tag push matching v*.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username, password, or token needed when Trusted Publishing is configured.
